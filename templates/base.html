<!DOCTYPE html>
<html lang="en">

<head>
    {% include 'head.html' %}
    {% block head_content %}
    {% endblock %}
</head>

<body>
    <div class="header">
        <div class="buttons">
            <a href="/" class="icon-button" title="Weather">
                <i class="fas fa-cloud-sun"></i>
            </a>
            <a href="/weather/long-term" class="icon-button" title="Long-term weather">
                <i class="fas fa-calendar-days"></i>
            </a>
            <a href="/traffic" class="icon-button" title="Traffic">
                <i class="fas fa-train-subway"></i>
            </a>
            {% if enable_food_tracking %}
                <a href="/eating" class="icon-button" title="Food">
                    <i class="fas fa-utensils"></i>
                </a>
                <a href="/planning" class="icon-button" title="Food types">
                    <i class="fas fa-list"></i>
                </a>
            {% endif %}
        </div>
        <div class="title">
            {% block title_content %}

            {% endblock %}
        </div>
    </div>

    <div class="main-content">
        {% block main_content %}

        {% endblock %}
    </div>
</body>

</html>
